<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Coin Clearance</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --border: #2a2f3d;
    --accent: #f0a500;
    --accent2: #e05c00;
    --text: #e8ecf4;
    --muted: #6b7280;
    --input-bg: #1e2230;
    --input-focus: #252b3b;
    --row-alt: #13161f;
    --green: #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    padding: 14px 16px 16px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 10px;
    gap: 12px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .header-left h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
    color: var(--text);
  }
  .header-left h1 span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn-print {
    background: var(--accent);
    color: #000;
    border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 3px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-print:hover { background: #ffb81a; }

  .btn-clear {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.76rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-clear:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ── Stats bar ── */
  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.58rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .stat-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.95rem;
    color: var(--accent);
    font-weight: 700;
  }

  /* ── 5-column EGM card grid ── */
  .egm-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex: 1;
  }

  /* Each column is its own mini-table panel */
  .egm-col {
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .egm-col table {
    width: 100%;
    border-collapse: collapse;
    flex: 1;
  }

  .egm-col thead tr {
    background: #1a1e2b;
    border-bottom: 2px solid var(--accent);
  }

  .egm-col th {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 5px 6px;
    text-align: left;
  }

  .egm-col th.col-egm  { width: 32px; text-align: center; }
  .egm-col th.col-coins { }
  .egm-col th.col-hopper { width: 48px; }
  .egm-col th.col-notes  { width: 36px; }

  .egm-col tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.08s;
  }
  .egm-col tbody tr:last-child { border-bottom: none; }
  .egm-col tbody tr:nth-child(even) { background: var(--row-alt); }
  .egm-col tbody tr:hover { background: #1c2030; }
  .egm-col tbody tr.disabled-row { opacity: 0.4; }
  .egm-col tbody tr.disabled-row:hover { background: inherit; }

  .egm-col td {
    padding: 3px 6px;
    vertical-align: middle;
  }

  .egm-col td.col-egm {
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .egm-col tbody tr:not(.disabled-row) td.col-egm { color: var(--text); }

  /* Coin input */
  .coin-input {
    background: var(--input-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    padding: 4px 6px;
    width: 100%;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.12s, background 0.12s;
    -moz-appearance: textfield;
  }
  .coin-input::-webkit-inner-spin-button,
  .coin-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .coin-input:focus { border-color: var(--accent); background: var(--input-focus); }
  .coin-input.has-value { border-color: var(--green); color: var(--green); }

  .hopper-cell { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--muted); }
  .notes-cell  { font-family: 'Barlow Condensed', sans-serif; font-size: 0.72rem; color: var(--muted); }

  .disabled-tag {
    display: inline-block;
    background: #1a1d26;
    border: 1px solid #2a2f3d;
    border-radius: 2px;
    padding: 1px 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.5rem;
    color: #444b5e;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── Print-only table hidden on screen ── */
  #print-table { display: none; }

  /* ══════════════════════════════════════
     MOBILE STYLES — single-column layout
  ══════════════════════════════════════ */
  @media (max-width: 767px) {

    body {
      padding: 10px 10px 24px;
    }

    /* Header stacks title above buttons */
    .header {
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      padding-bottom: 8px;
    }

    .header-left h1 {
      font-size: 1.35rem;
    }

    .header-right {
      width: 100%;
      justify-content: flex-start;
    }

    .btn-print, .btn-clear {
      font-size: 0.82rem;
      padding: 7px 14px;
    }

    /* Stats bar: allow wrapping, full-width items */
    .stats-bar {
      gap: 8px;
      margin-bottom: 10px;
    }

    .stat {
      flex: 1 1 auto;
      min-width: 140px;
      padding: 6px 12px;
    }

    /* ── SINGLE COLUMN GRID ── */
    .egm-grid {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* Each column panel takes full width */
    .egm-col {
      border-radius: 6px;
    }

    /* Larger, touch-friendly header cells */
    .egm-col th {
      font-size: 0.6rem;
      padding: 7px 8px;
    }

    .egm-col th.col-egm  { width: 40px; }
    .egm-col th.col-hopper { width: 56px; }
    .egm-col th.col-notes  { width: 44px; }

    /* Larger row height for finger tapping */
    .egm-col td {
      padding: 5px 8px;
    }

    .egm-col td.col-egm {
      font-size: 0.8rem;
    }

    /* Bigger coin input — easier to tap & type */
    .coin-input {
      font-size: 1.1rem;
      padding: 6px 8px;
      border-radius: 4px;
    }

    .hopper-cell { font-size: 0.72rem; }
    .notes-cell  { font-size: 0.78rem; }

    .disabled-tag {
      font-size: 0.55rem;
      padding: 2px 5px;
    }
  }


  /* ════════════════════════════════
     PRINT STYLES — A4 back-to-back
  ════════════════════════════════ */
  @media print {
    @page { size: A4 portrait; margin: 10mm 8mm; }

    * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

    body {
      background: #fff !important;
      color: #000 !important;
      padding: 0;
      display: block;
      min-height: unset;
    }

    .btn-print, .btn-clear, button { display: none !important; }
    .egm-grid { display: none !important; }

    #print-table { display: table; width: 100%; border-collapse: collapse; margin-top: 4pt; }

    .header {
      border-bottom: 1.5pt solid #000;
      padding-bottom: 5pt;
      margin-bottom: 4pt;
    }
    .header-left h1 { color: #000 !important; font-size: 14pt; }
    .header-left h1 span { color: #c47a00 !important; }

    .stats-bar { margin-bottom: 4pt; gap: 10pt; }
    .stat { background: #f5f5f5 !important; border: 0.5pt solid #ccc !important; padding: 3pt 8pt; }
    .stat-label { color: #666 !important; font-size: 6pt; }
    .stat-value { color: #c47a00 !important; font-size: 9pt; }
    #total-coins-input {
      background: transparent !important; border: none !important;
      border-bottom: 0.5pt solid #999 !important;
      color: #c47a00 !important; font-size: 9pt; width: 60pt; padding: 0;
    }
    #clearance-date { color: #c47a00 !important; font-size: 9pt; }

    #print-table thead tr { background: #f0f0f0 !important; border-bottom: 1.5pt solid #c47a00 !important; }
    #print-table th {
      color: #c47a00 !important; font-size: 8pt; padding: 5pt 4pt;
      text-align: left; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.08em; text-transform: uppercase;
      border-bottom: 1.5pt solid #c47a00;
    }
    #print-table th.col-egm-p   { width: 24pt; text-align: center; }
    #print-table th.col-coins-p  { width: 42pt; }
    #print-table th.col-hopper-p { width: 34pt; }
    #print-table th.col-notes-p  { width: 58pt; }
    #print-table th.col-div      { width: 6pt; border: none; background: #fff !important; }

    #print-table tbody tr { border-bottom: 0.5pt solid #ddd !important; }
    #print-table tbody tr:nth-child(even) { background: #f9f9f9 !important; }

    #print-table td {
      padding: 3.2pt 4pt; font-size: 8pt; line-height: 1.3; vertical-align: middle;
    }
    #print-table td.egm-num  { text-align: center; font-family: 'Share Tech Mono', monospace; font-size: 8pt; font-weight: 600; }
    #print-table td.coins-val { font-family: 'Share Tech Mono', monospace; font-size: 8pt; font-weight: 700; }
    #print-table td.coins-val.has-val { color: #000 !important; font-weight: 700; }
    #print-table td.divider   { background: #e0e0e0 !important; width: 1pt; padding: 0; }
    #print-table td.no-coins-cell {
      color: #888 !important; font-size: 6.5pt; font-family: 'Share Tech Mono', monospace;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    #print-table td.no-coins-cell span {
      display: inline-block; border: 0.5pt solid #999; border-radius: 2pt;
      padding: 0.5pt 3pt; color: #888 !important; background: #f0f0f0 !important;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Weekly <span>Coin</span> Clearance</h1>
  </div>
  <div class="header-right">
    <button class="btn-clear" onclick="clearAll()">✕ Clear entries</button>
    <button class="btn-print" onclick="window.print()">⬡ Print / Save PDF</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat">
    <span class="stat-label">Date</span>
    <span class="stat-value">
      <input type="date" id="clearance-date"
        style="background:transparent;border:none;color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:0.95rem;outline:none;cursor:pointer;padding:0;">
    </span>
  </div>
  <div class="stat">
    <span class="stat-label">Total Coins</span>
    <span class="stat-value" style="display:flex;align-items:center;gap:8px;">
      <input type="number" id="total-coins-input" min="0" step="1" value="0"
        style="background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:0.95rem;outline:none;width:90px;padding:0;-moz-appearance:textfield;"
        title="Click Calc to sum entries, or type to override">
      <button onclick="calculateTotal()"
        style="background:var(--accent);color:#000;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.72rem;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;border-radius:3px;cursor:pointer;">Calc</button>
    </span>
  </div>
</div>

<!-- 5-column screen grid -->
<div class="egm-grid" id="egm-grid"></div>

<!-- Print-only 8-column table built by JS -->
<table id="print-table"></table>

<script>
  const DISABLED_EGMS = new Set([10,11,12,13,14,15,19,25,26,27,28,43,50,55,60,61,62,69,70,71]);
  const EGM_NUMBERS  = Array.from({length: 77}, (_, i) => i + 1);
  const NUM_COLS = 5;

  // Distribute EGMs as evenly as possible across NUM_COLS columns
  function splitIntoColumns(arr, n) {
    const cols = [];
    const base = Math.floor(arr.length / n);
    const extra = arr.length % n;
    let i = 0;
    for (let c = 0; c < n; c++) {
      const size = base + (c < extra ? 1 : 0);
      cols.push(arr.slice(i, i + size));
      i += size;
    }
    return cols;
  }

  // ── Build screen grid ────────────────────────────────────
  const grid = document.getElementById('egm-grid');
  const columns = splitIntoColumns(EGM_NUMBERS, NUM_COLS);

  columns.forEach(colEGMs => {
    const colDiv = document.createElement('div');
    colDiv.className = 'egm-col';

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr>
      <th class="col-egm">EGM</th>
      <th class="col-coins">Coins</th>
      <th class="col-hopper">Hopper</th>
      <th class="col-notes">Notes</th>
    </tr></thead>`;

    const tbody = document.createElement('tbody');

    colEGMs.forEach(n => {
      const disabled = DISABLED_EGMS.has(n);
      const tr = document.createElement('tr');
      if (disabled) tr.classList.add('disabled-row');

      tr.innerHTML = `
        <td class="col-egm">${String(n).padStart(2,'0')}</td>
        <td>${disabled
          ? '<span class="disabled-tag">no coins</span>'
          : `<input type="text" class="coin-input" id="egm-${n}" placeholder="0" autocomplete="off" inputmode="numeric" pattern="[0-9]*" enterkeyhint="next">`
        }</td>
        <td class="hopper-cell col-hopper"></td>
        <td class="notes-cell col-notes"></td>
      `;

      if (!disabled) {
        const input = tr.querySelector('.coin-input');
        input.addEventListener('input', () => {
          // Strip anything that isn't a digit
          input.value = input.value.replace(/[^0-9]/g, '');
          if (input.value !== '' && parseInt(input.value) < 0) input.value = 0;
          input.classList.toggle('has-value', input.value !== '' && input.value !== '0');
          saveData();
        });
        input.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); focusNext(n); }
        });
        // iOS fires 'Go' as a submit on some keyboards — catch it too
        input.addEventListener('keypress', e => {
          if (e.key === 'Enter') { e.preventDefault(); focusNext(n); }
        });
      }

      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    colDiv.appendChild(table);
    grid.appendChild(colDiv);
  });

  // ── Build print table (8-column layout) ─────────────────
  function buildPrintTable() {
    const pt = document.getElementById('print-table');
    pt.innerHTML = '';

    const thead = document.createElement('thead');
    thead.innerHTML = `<tr>
      <th class="col-egm-p">EGM</th><th class="col-coins-p">Coins</th>
      <th class="col-hopper-p">Hopper</th><th class="col-notes-p">Notes</th>
      <th class="col-div"></th>
      <th class="col-egm-p">EGM</th><th class="col-coins-p">Coins</th>
      <th class="col-hopper-p">Hopper</th><th class="col-notes-p">Notes</th>
    </tr>`;
    pt.appendChild(thead);

    const ptbody = document.createElement('tbody');
    const half = Math.ceil(EGM_NUMBERS.length / 2);

    for (let i = 0; i < half; i++) {
      const left  = EGM_NUMBERS[i];
      const right = EGM_NUMBERS[i + half];

      const makeCell = (n) => {
        if (n === undefined) return '<td></td><td></td><td></td><td></td>';
        const disabled = DISABLED_EGMS.has(n);
        const label = String(n).padStart(2, '0');
        if (disabled) {
          return `<td class="egm-num">${label}</td><td class="no-coins-cell"><span>no coins</span></td><td></td><td></td>`;
        }
        const inp = document.getElementById(`egm-${n}`);
        const val = inp ? inp.value : '';
        const hasVal = val !== '' && val !== '0';
        if (!hasVal) {
          return `<td class="egm-num">${label}</td><td class="no-coins-cell"><span>no coins</span></td><td></td><td></td>`;
        }
        return `<td class="egm-num">${label}</td><td class="coins-val has-val">${val}</td><td></td><td></td>`;
      };

      const tr = document.createElement('tr');
      tr.innerHTML = makeCell(left) + '<td class="divider"></td>' + makeCell(right);
      ptbody.appendChild(tr);
    }
    pt.appendChild(ptbody);
  }

  document.addEventListener('input', e => {
    if (e.target.classList.contains('coin-input')) buildPrintTable();
  });

  // ── Focus next active EGM ────────────────────────────────
  function focusNext(current) {
    const active = EGM_NUMBERS.filter(n => !DISABLED_EGMS.has(n));
    const idx = active.indexOf(current);
    if (idx !== -1 && idx < active.length - 1) {
      const nextInput = document.getElementById(`egm-${active[idx+1]}`);
      nextInput.focus();
      // Scroll into view on mobile so the keyboard doesn't obscure it
      setTimeout(() => nextInput.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
    }
  }

  // ── Total Coins ──────────────────────────────────────────
  let totalOverridden = false;
  const totalInput = document.getElementById('total-coins-input');

  totalInput.addEventListener('input', () => {
    totalOverridden = true;
    if (totalInput.value.includes('.')) totalInput.value = Math.floor(parseFloat(totalInput.value));
    if (totalInput.value < 0) totalInput.value = 0;
    saveData();
  });
  totalInput.addEventListener('focus', () => { totalInput.style.borderBottomColor = 'var(--accent2)'; });
  totalInput.addEventListener('blur',  () => {
    totalInput.style.borderBottomColor = totalOverridden ? 'var(--accent2)' : 'var(--border)';
  });

  function calculateTotal() {
    let total = 0;
    EGM_NUMBERS.filter(n => !DISABLED_EGMS.has(n)).forEach(n => {
      total += parseInt(document.getElementById(`egm-${n}`).value) || 0;
    });
    totalInput.value = total;
    totalOverridden = false;
    totalInput.style.borderBottomColor = 'var(--border)';
    saveData();
  }

  // ── Storage ──────────────────────────────────────────────
  const STORAGE_KEY = 'egm-clearance-v1';

  function saveData() {
    const data = {};
    EGM_NUMBERS.filter(n => !DISABLED_EGMS.has(n)).forEach(n => {
      data[n] = document.getElementById(`egm-${n}`).value;
    });
    data._date          = document.getElementById('clearance-date').value;
    data._totalOverride = totalOverridden ? totalInput.value : null;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function loadData() {
    try {
      const data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      if (data._date) document.getElementById('clearance-date').value = data._date;
      EGM_NUMBERS.filter(n => !DISABLED_EGMS.has(n)).forEach(n => {
        const inp = document.getElementById(`egm-${n}`);
        if (inp && data[n] !== undefined && data[n] !== '') {
          inp.value = data[n];
          inp.classList.toggle('has-value', data[n] !== '0' && data[n] !== '');
        }
      });
      if (data._totalOverride !== null && data._totalOverride !== undefined) {
        totalOverridden = true;
        totalInput.value = data._totalOverride;
        totalInput.style.borderBottomColor = 'var(--accent2)';
      }
      buildPrintTable();
    } catch(e) {}
  }

  function clearAll() {
    if (!confirm('Clear all coin entries?')) return;
    EGM_NUMBERS.filter(n => !DISABLED_EGMS.has(n)).forEach(n => {
      const inp = document.getElementById(`egm-${n}`);
      if (inp) { inp.value = ''; inp.classList.remove('has-value'); }
    });
    totalOverridden = false;
    totalInput.value = 0;
    totalInput.style.borderBottomColor = 'var(--border)';
    saveData();
    buildPrintTable();
  }

  // ── Date default ─────────────────────────────────────────
  const dateInput = document.getElementById('clearance-date');
  dateInput.addEventListener('change', saveData);
  const today = new Date();
  dateInput.value = today.getFullYear() + '-' +
    String(today.getMonth()+1).padStart(2,'0') + '-' +
    String(today.getDate()).padStart(2,'0');

  // ── Init ─────────────────────────────────────────────────
  loadData();
  buildPrintTable();
</script>
</body>
</html>
