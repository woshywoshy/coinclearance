<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGM Dropbox Clearance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  /* ===== THEME VARIABLES ===== */
  [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #181b24;
    --surface-alt: #1e2230;
    --border: #2a2e3d;
    --text: #e4e6ed;
    --text-muted: #7a7f94;
    --accent: #4ade80;
    --accent-dim: rgba(74, 222, 128, 0.1);
    --accent-border: rgba(74, 222, 128, 0.25);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.1);
    --blue: #60a5fa;
    --no-coin-bg: #1a1520;
    --no-coin-border: rgba(248, 113, 113, 0.15);
    --empty-bg: rgba(255,255,255,0.06);
    --empty-border: #2a2e3d;
    --empty-text: #7a7f94;
    --calendar-filter: invert(0.7);
  }

  [data-theme="light"] {
    --bg: #f4f5f7;
    --surface: #ffffff;
    --surface-alt: #eef0f4;
    --border: #d1d5de;
    --text: #1a1d26;
    --text-muted: #6b7084;
    --accent: #16a34a;
    --accent-dim: rgba(22, 163, 74, 0.08);
    --accent-border: rgba(22, 163, 74, 0.3);
    --red: #dc2626;
    --red-dim: rgba(220, 38, 38, 0.07);
    --blue: #2563eb;
    --no-coin-bg: #fef2f2;
    --no-coin-border: rgba(220, 38, 38, 0.2);
    --empty-bg: #f0f1f3;
    --empty-border: #c5c9d4;
    --empty-text: #6b7084;
    --calendar-filter: none;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: background 0.2s, color 0.2s;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.2s, border-color 0.2s;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .brand h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .brand h1 span { color: var(--accent); }

  .stats-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .stat-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    transition: background 0.2s, border-color 0.2s;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }

  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface-alt);
    color: var(--text);
  }

  .btn:hover { border-color: var(--text-muted); transform: translateY(-1px); }

  .btn-accent { background: var(--accent); color: #0f1117; border-color: var(--accent); }
  [data-theme="light"] .btn-accent { color: #fff; }
  .btn-accent:hover { opacity: 0.9; }

  .btn-red { color: var(--red); border-color: var(--no-coin-border); background: var(--red-dim); }
  .btn-red:hover { border-color: var(--red); }

  .btn-blue { color: var(--blue); border-color: rgba(96,165,250,0.25); background: rgba(96,165,250,0.08); }
  .btn-blue:hover { border-color: var(--blue); }

  .btn-green { color: var(--accent); border-color: var(--accent-border); background: var(--accent-dim); }
  .btn-green:hover { border-color: var(--accent); }

  .btn-theme { font-size: 15px; padding: 6px 10px; line-height: 1; }

  /* ===== LAYOUT ===== */
  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px 12px 8px;
    overflow: hidden;
  }

  .grid-wrapper {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .table-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .table-col table {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .table-col thead { display: table; width: 100%; table-layout: fixed; }
  .table-col tbody { display: flex; flex-direction: column; flex: 1; }
  .table-col tbody tr { display: table; width: 100%; table-layout: fixed; flex: 1; }

  /* ===== INPUTS ===== */
  .date-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 4px 8px;
    cursor: pointer;
  }

  .date-input:focus { outline: none; border-color: var(--accent); }
  .date-input::-webkit-calendar-picker-indicator { filter: var(--calendar-filter); cursor: pointer; }

  .total-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 8px;
    width: 140px;
    -moz-appearance: textfield;
  }

  .total-input::-webkit-outer-spin-button,
  .total-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .total-input:focus { outline: none; border-color: var(--accent); }
  .total-input::placeholder { color: var(--text-muted); }

  /* ===== TABLE CELLS (screen) ===== */
  .table-col thead th {
    background: var(--surface-alt);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 6px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }

  .table-col thead th:first-child { text-align: left; width: 36px; }
  .table-col thead th:nth-child(2) { width: 40%; }
  .table-col tbody td:nth-child(2) { width: 40%; }
  .table-col tbody td:first-child { width: 36px; text-align: left; }

  .table-col tbody tr { transition: background 0.1s ease; }
  .table-col tbody tr:hover { background: rgba(255,255,255,0.02); }
  [data-theme="light"] .table-col tbody tr:hover { background: rgba(0,0,0,0.02); }

  .table-col tbody tr.no-coin-row { background: var(--no-coin-bg); }
  .table-col tbody tr.no-coin-row:hover { background: var(--no-coin-bg); }

  .table-col tbody td {
    padding: 0 6px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
    vertical-align: middle;
  }

  .table-col tbody tr:last-child td { border-bottom: none; }

  /* ===== BADGES & INPUTS ===== */
  .egm-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .egm-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--no-coin-border);
  }

  .empty-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--empty-bg);
    color: var(--empty-text);
    border: 1px solid var(--empty-border);
    display: none;
  }

  .coin-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    width: 100%;
    max-width: 80px;
    padding: 5px 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    text-align: center;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    -moz-appearance: textfield;
    display: block;
    margin: 0 auto;
  }

  .coin-input::-webkit-outer-spin-button,
  .coin-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

  .coin-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .coin-input.has-value {
    border-color: var(--accent-border);
    background: var(--accent-dim);
  }

  /* ===== PRINT LAYOUT ===== */
  .print-layout { display: none; }

  @media print {
    @page { margin: 9.5mm; size: A4 portrait; }
    body { background: #fff; color: #111; height: auto; overflow: visible; display: block; }
    .header { position: static; background: #fff; border-bottom: 1.5px solid #111; padding: 4px 8px; }
    .brand-icon { display: none; }
    .brand h1 { color: #111; font-size: 13px; }
    .brand h1 span { color: #111; }
    .stat-card { background: #f5f5f5; border: 1px solid #ccc; padding: 2px 6px; }
    .stat-label { color: #666; font-size: 8px; }
    .stat-value { color: #111; }
    .actions { display: none; }
    .date-input { color: #111; border-color: #999; font-size: 10px; padding: 1px 3px; }
    .date-input::-webkit-calendar-picker-indicator { display: none; }
    .total-input { color: #111; border-color: #999; font-size: 11px; padding: 1px 3px; width: 80px; }
    .stats-row { gap: 6px; }
    .container { display: none !important; }

    .print-layout {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 2px 0;
    }

    .print-layout table {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #111;
      font-size: 10px;
    }

    .print-layout thead th {
      background: #eee;
      color: #333;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 3px;
      text-align: center;
      border-bottom: 1.5px solid #111;
    }

    .print-layout thead th:first-child { text-align: left; width: 30px; }

    .print-layout tbody td {
      padding: 4.7px 3px;
      border-bottom: 0.5px solid #bbb;
      text-align: center;
      font-size: 10.5px;
      vertical-align: middle;
    }

    .print-layout tbody td:first-child { text-align: left; }
    .print-layout tbody tr:last-child td { border-bottom: none; }
    .print-layout tbody tr.no-coin-row { background: #f9f5f5; }

    .print-layout .egm-num {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 10.5px;
      color: #111;
    }

    .print-layout .egm-badge {
      font-size: 7px;
      padding: 1px 3px;
      background: #fee;
      color: #c00;
      border: 0.5px solid #c00;
      border-radius: 2px;
    }

    .print-layout .coin-input { display: none; }

    .print-layout .coin-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 500;
      color: #111;
    }

    .print-layout .empty-badge {
      font-size: 7px;
      padding: 1px 3px;
      background: #f0f0f0;
      color: #888;
      border: 0.5px solid #bbb;
      border-radius: 2px;
      display: none;
    }

    .print-layout .empty-badge.visible { display: inline; }
  }

  @media (max-width: 600px) {
    .header { padding: 16px; }
    .container { padding: 16px 16px 60px; }
    .header-top { flex-direction: column; align-items: flex-start; }
    .coin-input { width: 90px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">🎰</div>
      <h1>EGM <span>Dropbox Clearance</span></h1>
    </div>
    <div class="actions">
      <button class="btn btn-accent" onclick="calculateTotal()">⟳ Calculate Total</button>
      <button class="btn btn-red" onclick="clearEntries()">✕ Clear Entries</button>
      <button class="btn btn-green" onclick="exportCSV()">↓ Export CSV</button>
      <button class="btn btn-blue" onclick="handlePrint()">⎙ Print</button>
      <button class="btn btn-theme" onclick="toggleTheme()" id="themeBtn" title="Toggle light/dark mode">☀️</button>
    </div>
  </div>
  <div style="margin-top: 10px;">
    <div class="stats-row">
      <div class="stat-card">
        <div>
          <div class="stat-label">Date</div>
          <input type="date" class="date-input" id="currentDate">
        </div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Total Coins</div>
          <input type="text" class="total-input" id="totalCoins" placeholder="—" inputmode="numeric">
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="grid-wrapper">
    <div class="table-col"><table><thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead><tbody id="tableBody1"></tbody></table></div>
    <div class="table-col"><table><thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead><tbody id="tableBody2"></tbody></table></div>
    <div class="table-col"><table><thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead><tbody id="tableBody3"></tbody></table></div>
    <div class="table-col"><table><thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead><tbody id="tableBody4"></tbody></table></div>
    <div class="table-col"><table><thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead><tbody id="tableBody5"></tbody></table></div>
  </div>
</div>

<div class="print-layout">
  <table><thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead><tbody id="printBody1"></tbody></table>
  <table><thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead><tbody id="printBody2"></tbody></table>
</div>

<script>
  const NO_COIN_MACHINES = new Set([10,11,12,13,14,15,19,25,26,27,28,43,50,55,60,61,62,69,70,71]);
  const TOTAL_MACHINES = 77;

  // ===== THEME =====
  const savedTheme = localStorage.getItem('egm-theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
  document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '☀️' : '🌙';

  function toggleTheme() {
    const html = document.documentElement;
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    document.getElementById('themeBtn').textContent = next === 'dark' ? '☀️' : '🌙';
    localStorage.setItem('egm-theme', next);
  }

  // ===== AUTOSAVE =====
  const SAVE_KEY = 'egm-dropbox-clearance';

  function autoSave() {
    const data = {
      date: document.getElementById('currentDate').value,
      total: document.getElementById('totalCoins').value,
      coins: {},
      empties: []
    };
    document.querySelectorAll('.container .coin-input').forEach(input => {
      if (input.value) data.coins[input.dataset.egm] = input.value;
    });
    document.querySelectorAll('.container [data-empty-egm]').forEach(badge => {
      if (badge.style.display === 'inline') data.empties.push(badge.dataset.emptyEgm);
    });
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  }

  function autoLoad() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    try {
      const data = JSON.parse(raw);
      if (data.date) document.getElementById('currentDate').value = data.date;
      if (data.total) document.getElementById('totalCoins').value = data.total;
      return data;
    } catch(e) { return false; }
  }

  function restoreCoinValues(data) {
    if (!data || !data.coins) return;
    Object.entries(data.coins).forEach(([egm, val]) => {
      const input = document.querySelector(`.coin-input[data-egm="${egm}"]`);
      if (input) {
        input.value = val;
        input.classList.toggle('has-value', val !== '');
      }
    });
    if (data.empties) {
      data.empties.forEach(egm => {
        const badge = document.querySelector(`[data-empty-egm="${egm}"]`);
        const input = document.querySelector(`.coin-input[data-egm="${egm}"]`);
        if (badge) badge.style.display = 'inline';
        if (input) input.style.display = 'none';
      });
    }
  }

  // Load saved date/total before building tables
  const savedData = autoLoad();

  // ===== DATE (only set today if no saved data) =====
  if (!savedData) document.getElementById('currentDate').value = new Date().toISOString().split('T')[0];

  // Save on date change
  document.getElementById('currentDate').addEventListener('change', autoSave);

  // ===== TOTAL INPUT =====
  document.getElementById('totalCoins').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
    autoSave();
  });

  // ===== BUILD TABLES =====
  const COL_SIZE = 16;
  const tbodies = [1,2,3,4,5].map(n => document.getElementById('tableBody' + n));
  const printBodies = [1,2].map(n => document.getElementById('printBody' + n));
  const PRINT_COL = 39;
  const coinInputs = [];

  for (let i = 1; i <= TOTAL_MACHINES; i++) {
    const colIndex = Math.min(Math.floor((i - 1) / COL_SIZE), 4);
    const printColIndex = i <= PRINT_COL ? 0 : 1;
    const isNoCoin = NO_COIN_MACHINES.has(i);
    const num = String(i).padStart(2, '0');

    // --- Screen row ---
    const tr = document.createElement('tr');
    if (isNoCoin) tr.classList.add('no-coin-row');

    const tdEgm = document.createElement('td');
    tdEgm.innerHTML = `<span class="egm-num">${num}</span>`;

    const tdCoins = document.createElement('td');
    if (isNoCoin) {
      tdCoins.innerHTML = '<span class="egm-badge">No Coin</span>';
    } else {
      const input = document.createElement('input');
      input.type = 'text';
      input.inputMode = 'numeric';
      input.pattern = '[0-9]*';
      input.className = 'coin-input';
      input.dataset.egm = i;
      input.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        this.classList.toggle('has-value', this.value !== '');
        const badge = this.parentElement.querySelector('.empty-badge');
        if (badge) badge.style.display = 'none';
        if (this.style.display === 'none') this.style.display = '';
        autoSave();
      });
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
          e.preventDefault();
          const idx = coinInputs.indexOf(this);
          if (idx >= 0 && idx < coinInputs.length - 1) coinInputs[idx + 1].focus();
        }
        if (e.key === 'Tab' && e.shiftKey) {
          e.preventDefault();
          const idx = coinInputs.indexOf(this);
          if (idx > 0) coinInputs[idx - 1].focus();
        }
      });
      tdCoins.appendChild(input);
      coinInputs.push(input);

      const emptyBadge = document.createElement('span');
      emptyBadge.className = 'empty-badge';
      emptyBadge.textContent = 'Empty';
      emptyBadge.dataset.emptyEgm = i;
      // Click empty badge to re-enable input
      emptyBadge.style.cursor = 'pointer';
      emptyBadge.addEventListener('click', function() {
        this.style.display = 'none';
        input.style.display = '';
        input.focus();
        autoSave();
      });
      tdCoins.appendChild(emptyBadge);
    }

    const tdHopper = document.createElement('td');
    const tdNotes = document.createElement('td');
    tr.append(tdEgm, tdCoins, tdHopper, tdNotes);
    tbodies[colIndex].appendChild(tr);

    // --- Print row ---
    const ptr = document.createElement('tr');
    if (isNoCoin) ptr.classList.add('no-coin-row');

    const ptdEgm = document.createElement('td');
    ptdEgm.innerHTML = `<span class="egm-num">${num}</span>`;

    const ptdCoins = document.createElement('td');
    if (isNoCoin) {
      ptdCoins.innerHTML = '<span class="egm-badge">No Coin</span>';
    } else {
      const pspan = document.createElement('span');
      pspan.className = 'coin-value';
      pspan.dataset.printEgm = i;
      ptdCoins.appendChild(pspan);
      const pEmpty = document.createElement('span');
      pEmpty.className = 'empty-badge';
      pEmpty.textContent = 'Empty';
      pEmpty.dataset.printEmptyEgm = i;
      ptdCoins.appendChild(pEmpty);
    }

    const ptdHopper = document.createElement('td');
    const ptdNotes = document.createElement('td');
    ptr.append(ptdEgm, ptdCoins, ptdHopper, ptdNotes);
    printBodies[printColIndex].appendChild(ptr);
  }

  // Pad right print table to 39 rows
  const padRow = document.createElement('tr');
  for (let c = 0; c < 4; c++) { const td = document.createElement('td'); td.innerHTML = '&nbsp;'; padRow.appendChild(td); }
  printBodies[1].appendChild(padRow);

  // Restore saved coin values after tables are built
  restoreCoinValues(savedData);

  // ===== SYNC PRINT =====
  function syncPrintValues() {
    document.querySelectorAll('.container .coin-input').forEach(input => {
      const egm = input.dataset.egm;
      const ps = document.querySelector(`[data-print-egm="${egm}"]`);
      const pe = document.querySelector(`[data-print-empty-egm="${egm}"]`);
      const se = document.querySelector(`[data-empty-egm="${egm}"]`);
      if (ps) ps.textContent = input.value;
      if (pe && se) {
        if (se.style.display === 'inline') {
          pe.classList.add('visible');
          if (ps) ps.style.display = 'none';
        } else {
          pe.classList.remove('visible');
          if (ps) ps.style.display = '';
        }
      }
    });
  }

  function handlePrint() { syncPrintValues(); window.print(); }

  // ===== CALCULATE TOTAL =====
  function calculateTotal() {
    let total = 0;
    document.querySelectorAll('.container .coin-input').forEach(input => {
      const val = parseInt(input.value, 10);
      const badge = document.querySelector(`[data-empty-egm="${input.dataset.egm}"]`);
      if (!isNaN(val)) {
        total += val;
        if (badge) badge.style.display = 'none';
        input.style.display = '';
      } else {
        if (badge) badge.style.display = 'inline';
        input.style.display = 'none';
      }
    });
    document.getElementById('totalCoins').value = total.toLocaleString('en-AU');
    autoSave();
  }

  // ===== CLEAR =====
  function clearEntries() {
    if (!confirm('Clear all coin entries? This cannot be undone.')) return;
    document.querySelectorAll('.container .coin-input').forEach(input => {
      input.value = '';
      input.classList.remove('has-value');
      input.style.display = '';
    });
    document.querySelectorAll('.empty-badge').forEach(b => { b.style.display = 'none'; b.classList.remove('visible'); });
    document.getElementById('totalCoins').value = '';
    localStorage.removeItem(SAVE_KEY);
  }

  // ===== EXPORT CSV =====
  function exportCSV() {
    const date = document.getElementById('currentDate').value;
    const totalCoins = document.getElementById('totalCoins').value || '';
    let csv = 'EGM,Coins,Hopper,Notes\n';
    for (let i = 1; i <= TOTAL_MACHINES; i++) {
      let coins = '';
      if (NO_COIN_MACHINES.has(i)) {
        coins = 'No Coin';
      } else {
        const input = document.querySelector(`.coin-input[data-egm="${i}"]`);
        if (input && input.value) {
          coins = input.value;
        } else {
          const badge = document.querySelector(`[data-empty-egm="${i}"]`);
          coins = (badge && badge.style.display === 'inline') ? 'Empty' : '';
        }
      }
      csv += `${String(i).padStart(2,'0')},${coins},,\n`;
    }
    csv += `\nDate:,${date}\nTotal Coins:,${totalCoins}\n`;
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `dropbox-clearance-${date}.csv`;
    a.click();
    URL.revokeObjectURL(a.href);
  }
</script>
</body>
