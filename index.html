<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EGM Dropbox Clearance</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface-alt: #1e2230;
    --border: #2a2e3d;
    --text: #e4e6ed;
    --text-muted: #7a7f94;
    --accent: #4ade80;
    --accent-dim: rgba(74, 222, 128, 0.1);
    --accent-border: rgba(74, 222, 128, 0.25);
    --red: #f87171;
    --red-dim: rgba(248, 113, 113, 0.1);
    --blue: #60a5fa;
    --yellow: #fbbf24;
    --no-coin-bg: #1a1520;
    --no-coin-border: rgba(248, 113, 113, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-icon {
    width: 34px;
    height: 34px;
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .brand h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .brand h1 span {
    color: var(--accent);
  }

  .stats-row {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .stat-card {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface-alt);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.total-coins {
    color: var(--accent);
    font-size: 20px;
  }

  .actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--surface-alt);
    color: var(--text);
  }

  .btn:hover {
    border-color: var(--text-muted);
    transform: translateY(-1px);
  }

  .btn-accent {
    background: var(--accent);
    color: #0f1117;
    border-color: var(--accent);
  }

  .btn-accent:hover {
    background: #6ee7a0;
    border-color: #6ee7a0;
  }

  .btn-red {
    color: var(--red);
    border-color: var(--no-coin-border);
    background: var(--red-dim);
  }

  .btn-red:hover {
    border-color: var(--red);
  }

  .btn-blue {
    color: var(--blue);
    border-color: rgba(96, 165, 250, 0.25);
    background: rgba(96, 165, 250, 0.08);
  }

  .btn-blue:hover {
    border-color: var(--blue);
  }

  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px 12px 8px;
    overflow: hidden;
  }

  .grid-wrapper {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .table-col {
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .table-col table {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .table-col thead {
    display: table;
    width: 100%;
    table-layout: fixed;
  }

  .table-col tbody {
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  .table-col tbody tr {
    display: table;
    width: 100%;
    table-layout: fixed;
    flex: 1;
  }

  .date-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    padding: 4px 8px;
    cursor: pointer;
  }

  .date-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .date-input::-webkit-calendar-picker-indicator {
    filter: invert(0.7);
    cursor: pointer;
  }

  .total-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 4px 8px;
    width: 140px;
    -moz-appearance: textfield;
  }

  .total-input::-webkit-outer-spin-button,
  .total-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .total-input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .total-input::placeholder {
    color: var(--text-muted);
  }

  .table-col table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .table-col thead th {
    background: var(--surface-alt);
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    padding: 6px 6px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }

  .table-col thead th:first-child {
    text-align: left;
    width: 36px;
  }

  .table-col thead th:nth-child(2) {
    width: 40%;
  }

  .table-col tbody td:nth-child(2) {
    width: 40%;
  }

  .table-col tbody td:first-child {
    width: 36px;
    text-align: left;
  }

  .table-col tbody tr {
    transition: background 0.1s ease;
  }

  .table-col tbody tr:hover {
    background: rgba(255,255,255,0.02);
  }

  .table-col tbody tr.no-coin-row {
    background: var(--no-coin-bg);
  }

  .table-col tbody tr.no-coin-row:hover {
    background: #1e1828;
  }

  .table-col tbody td {
    padding: 0 6px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    font-size: 12px;
    vertical-align: middle;
  }

  .table-col tbody tr:last-child td {
    border-bottom: none;
  }

  .egm-num {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 12px;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .egm-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--red-dim);
    color: var(--red);
    border: 1px solid var(--no-coin-border);
  }

  .empty-badge {
    font-family: 'DM Sans', sans-serif;
    font-size: 8px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    color: var(--text-muted);
    border: 1px solid var(--border);
    display: none;
  }

  .coin-input {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    width: 100%;
    max-width: 80px;
    padding: 5px 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    text-align: center;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
    -moz-appearance: textfield;
    display: block;
    margin: 0 auto;
  }

  .coin-input::-webkit-outer-spin-button,
  .coin-input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }

  .coin-input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .coin-input.has-value {
    border-color: var(--accent-border);
    background: var(--accent-dim);
  }

  .print-layout {
    display: none;
  }

  @media print {
    @page { margin: 9.5mm; size: A4 portrait; }
    body { background: #fff; color: #111; height: auto; overflow: visible; display: block; }
    .header { position: static; background: #fff; border-bottom: 1.5px solid #111; padding: 4px 8px; }
    .brand-icon { display: none; }
    .brand h1 { color: #111; font-size: 13px; }
    .brand h1 span { color: #111; }
    .stat-card { background: #f5f5f5; border: 1px solid #ccc; padding: 2px 6px; }
    .stat-label { color: #666; font-size: 8px; }
    .stat-value, .stat-value.total-coins { color: #111; }
    .actions { display: none; }
    .date-input { color: #111; border-color: #999; font-size: 10px; padding: 1px 3px; }
    .date-input::-webkit-calendar-picker-indicator { display: none; }
    .total-input { color: #111; border-color: #999; font-size: 11px; padding: 1px 3px; width: 80px; }
    .stats-row { gap: 6px; }

    /* Hide the 5-column screen layout */
    .container { display: none !important; }

    /* Show the 2-column print layout */
    .print-layout {
      display: grid !important;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 2px 0;
    }

    .print-layout table {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #111;
      font-size: 10px;
    }

    .print-layout thead th {
      background: #eee;
      color: #333;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 3px;
      text-align: center;
      border-bottom: 1.5px solid #111;
    }

    .print-layout thead th:first-child {
      text-align: left;
      width: 30px;
    }

    .print-layout tbody td {
      padding: 4.7px 3px;
      border-bottom: 0.5px solid #bbb;
      text-align: center;
      font-size: 10.5px;
      vertical-align: middle;
    }

    .print-layout tbody td:first-child {
      text-align: left;
    }

    .print-layout tbody tr:last-child td {
      border-bottom: none;
    }

    .print-layout tbody tr.no-coin-row {
      background: #f9f5f5;
    }

    .print-layout .egm-num {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      font-size: 10.5px;
      color: #111;
    }

    .print-layout .egm-badge {
      font-size: 7px;
      padding: 1px 3px;
      background: #fee;
      color: #c00;
      border: 0.5px solid #c00;
      border-radius: 2px;
    }

    .print-layout .coin-input {
      display: none;
    }

    .print-layout .coin-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      font-weight: 500;
      color: #111;
    }

    .print-layout .empty-badge {
      font-size: 7px;
      padding: 1px 3px;
      background: #f0f0f0;
      color: #888;
      border: 0.5px solid #bbb;
      border-radius: 2px;
      display: none;
    }

    .print-layout .empty-badge.visible {
      display: inline;
    }
  }

  @media (max-width: 600px) {
    .header { padding: 16px; }
    .container { padding: 16px 16px 60px; }
    .header-top { flex-direction: column; align-items: flex-start; }
    .coin-input { width: 90px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="brand">
      <div class="brand-icon">🎰</div>
      <h1>EGM <span>Dropbox Clearance</span></h1>
    </div>
    <div class="actions">
      <button class="btn btn-accent" onclick="calculateTotal()">⟳ Calculate Total</button>
      <button class="btn btn-red" onclick="clearEntries()">✕ Clear Entries</button>
      <button class="btn btn-blue" onclick="handlePrint()">⎙ Print</button>
    </div>
  </div>
  <div style="margin-top: 10px;">
    <div class="stats-row">
      <div class="stat-card">
        <div>
          <div class="stat-label">Date</div>
          <input type="date" class="date-input" id="currentDate">
        </div>
      </div>
      <div class="stat-card">
        <div>
          <div class="stat-label">Total Coins</div>
          <input type="text" class="total-input" id="totalCoins" placeholder="—" inputmode="numeric">
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="grid-wrapper">
    <div class="table-col">
      <table>
        <thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead>
        <tbody id="tableBody1"></tbody>
      </table>
    </div>
    <div class="table-col">
      <table>
        <thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead>
        <tbody id="tableBody2"></tbody>
      </table>
    </div>
    <div class="table-col">
      <table>
        <thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead>
        <tbody id="tableBody3"></tbody>
      </table>
    </div>
    <div class="table-col">
      <table>
        <thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead>
        <tbody id="tableBody4"></tbody>
      </table>
    </div>
    <div class="table-col">
      <table>
        <thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead>
        <tbody id="tableBody5"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Print-only 2-column layout -->
<div class="print-layout">
  <table>
    <thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead>
    <tbody id="printBody1"></tbody>
  </table>
  <table>
    <thead><tr><th>EGM</th><th>Coins</th><th>Hopper</th><th>Notes</th></tr></thead>
    <tbody id="printBody2"></tbody>
  </table>
</div>

<script>
  const NO_COIN_MACHINES = new Set([10,11,12,13,14,15,19,25,26,27,28,43,50,55,60,61,62,69,70,71]);
  const TOTAL_MACHINES = 77;

  // Set date
  const now = new Date();
  const dateInput = document.getElementById('currentDate');
  dateInput.value = now.toISOString().split('T')[0];

  // Total input - only accept numbers
  document.getElementById('totalCoins').addEventListener('input', function() {
    this.value = this.value.replace(/[^0-9]/g, '');
  });

  // Build screen tables - 5 columns
  const COL_SIZE = 16;
  const tbodies = [
    document.getElementById('tableBody1'),
    document.getElementById('tableBody2'),
    document.getElementById('tableBody3'),
    document.getElementById('tableBody4'),
    document.getElementById('tableBody5')
  ];

  // Build print tables - 2 columns (39 + 38)
  const PRINT_COL = 39;
  const printBodies = [
    document.getElementById('printBody1'),
    document.getElementById('printBody2')
  ];

  for (let i = 1; i <= TOTAL_MACHINES; i++) {
    const colIndex = Math.min(Math.floor((i - 1) / COL_SIZE), 4);
    const printColIndex = i <= PRINT_COL ? 0 : 1;
    const isNoCoin = NO_COIN_MACHINES.has(i);

    // --- Screen row ---
    const tr = document.createElement('tr');
    if (isNoCoin) tr.classList.add('no-coin-row');

    const tdEgm = document.createElement('td');
    tdEgm.innerHTML = `<span class="egm-num">${String(i).padStart(2, '0')}</span>`;

    const tdCoins = document.createElement('td');
    if (isNoCoin) {
      tdCoins.innerHTML = '<span class="egm-badge">No Coin</span>';
    } else {
      const input = document.createElement('input');
      input.type = 'text';
      input.inputMode = 'numeric';
      input.pattern = '[0-9]*';
      input.className = 'coin-input';
      input.dataset.egm = i;
      input.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        this.classList.toggle('has-value', this.value !== '');
        // Hide empty badge when user starts typing
        const badge = this.parentElement.querySelector('.empty-badge');
        if (badge) badge.style.display = 'none';
      });
      tdCoins.appendChild(input);
      const emptyBadge = document.createElement('span');
      emptyBadge.className = 'empty-badge';
      emptyBadge.textContent = 'Empty';
      emptyBadge.dataset.emptyEgm = i;
      tdCoins.appendChild(emptyBadge);
    }

    const tdHopper = document.createElement('td');
    const tdNotes = document.createElement('td');
    tr.append(tdEgm, tdCoins, tdHopper, tdNotes);
    tbodies[colIndex].appendChild(tr);

    // --- Print row ---
    const ptr = document.createElement('tr');
    if (isNoCoin) ptr.classList.add('no-coin-row');

    const ptdEgm = document.createElement('td');
    ptdEgm.innerHTML = `<span class="egm-num">${String(i).padStart(2, '0')}</span>`;

    const ptdCoins = document.createElement('td');
    if (isNoCoin) {
      ptdCoins.innerHTML = '<span class="egm-badge">No Coin</span>';
    } else {
      const pspan = document.createElement('span');
      pspan.className = 'coin-value';
      pspan.dataset.printEgm = i;
      ptdCoins.appendChild(pspan);
      const pEmptyBadge = document.createElement('span');
      pEmptyBadge.className = 'empty-badge';
      pEmptyBadge.textContent = 'Empty';
      pEmptyBadge.dataset.printEmptyEgm = i;
      ptdCoins.appendChild(pEmptyBadge);
    }

    const ptdHopper = document.createElement('td');
    const ptdNotes = document.createElement('td');
    ptr.append(ptdEgm, ptdCoins, ptdHopper, ptdNotes);
    printBodies[printColIndex].appendChild(ptr);
  }

  // Add empty row to right table so both have 39 rows (uniform height)
  const emptyRow = document.createElement('tr');
  for (let c = 0; c < 4; c++) {
    const td = document.createElement('td');
    td.innerHTML = '&nbsp;';
    emptyRow.appendChild(td);
  }
  printBodies[1].appendChild(emptyRow);

  // Sync screen values to print layout before printing
  function syncPrintValues() {
    document.querySelectorAll('.container .coin-input').forEach(input => {
      const egm = input.dataset.egm;
      const printSpan = document.querySelector(`[data-print-egm="${egm}"]`);
      const printEmpty = document.querySelector(`[data-print-empty-egm="${egm}"]`);
      if (printSpan) {
        printSpan.textContent = input.value;
      }
      // Sync empty badge visibility
      const screenEmpty = document.querySelector(`[data-empty-egm="${egm}"]`);
      if (printEmpty && screenEmpty) {
        if (screenEmpty.style.display === 'inline') {
          printEmpty.classList.add('visible');
          if (printSpan) printSpan.style.display = 'none';
        } else {
          printEmpty.classList.remove('visible');
          if (printSpan) printSpan.style.display = '';
        }
      }
    });
  }

  function handlePrint() {
    syncPrintValues();
    window.print();
  }

  function calculateTotal() {
    let total = 0;
    document.querySelectorAll('.container .coin-input').forEach(input => {
      const val = parseInt(input.value, 10);
      const egm = input.dataset.egm;
      const badge = document.querySelector(`[data-empty-egm="${egm}"]`);
      if (!isNaN(val)) {
        total += val;
        if (badge) badge.style.display = 'none';
        input.style.display = '';
      } else {
        // Blank input — show empty badge, hide input
        if (badge) badge.style.display = 'inline';
        input.style.display = 'none';
      }
    });
    document.getElementById('totalCoins').value = total.toLocaleString('en-AU');
  }

  function clearEntries() {
    if (!confirm('Clear all coin entries? This cannot be undone.')) return;
    document.querySelectorAll('.container .coin-input').forEach(input => {
      input.value = '';
      input.classList.remove('has-value');
      input.style.display = '';
    });
    document.querySelectorAll('.empty-badge').forEach(badge => {
      badge.style.display = 'none';
      badge.classList.remove('visible');
    });
    document.getElementById('totalCoins').value = '';
  }
</script>

</body>
</html>
